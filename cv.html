<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CV - Aoxue Dai</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* password dialog */
    .auth-box {
      text-align: center;
      padding: 40px 36px;
      background: #fff;
      border-radius: 10px;
      border: 1px solid #e2e8f0;
      box-shadow: 0 2px 16px rgba(0,0,0,.06);
      max-width: 340px;
      width: 90%;
    }
    .auth-box h2 {
      font-size: 18px;
      font-weight: 700;
      color: #1e293b;
      margin-bottom: 6px;
    }
    .auth-box p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 22px;
    }
    .auth-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      text-align: center;
      letter-spacing: 2px;
    }
    .auth-box input:focus {
      border-color: #16a34a;
    }
    .auth-box input.shake {
      animation: shake .35s;
      border-color: #ef4444;
    }
    .auth-box button {
      margin-top: 14px;
      width: 100%;
      padding: 10px 0;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .auth-box button:hover { background: #166534; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    /* pdf viewer */
    .pdf-viewer {
      display: none;
      position: fixed;
      inset: 0;
      background: #f8fafc;
    }
    .pdf-viewer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

<div class="auth-box" id="auth-box">
  <h2>Password Required</h2>
  <p>Enter the password to view the CV.</p>
  <input type="password" id="pwd-input" placeholder="password" autocomplete="off" />
  <button id="pwd-btn">Confirm</button>
</div>

<div class="pdf-viewer" id="pdf-viewer">
  <iframe id="pdf-frame"></iframe>
</div>

<script>
(function () {
  var PASS = "20260306";
  var PDF  = "files/cv.pdf";

  var query = location.search.replace(/^\?/, "");
  if (query === PASS) {
    showPDF();
    return;
  }

  var box   = document.getElementById("auth-box");
  var input = document.getElementById("pwd-input");
  var btn   = document.getElementById("pwd-btn");

  function tryAuth() {
    if (input.value === PASS) {
      showPDF();
    } else {
      input.classList.add("shake");
      setTimeout(function () { input.classList.remove("shake"); }, 400);
    }
  }

  btn.addEventListener("click", tryAuth);
  input.addEventListener("keydown", function (e) {
    if (e.key === "Enter") tryAuth();
  });

  function showPDF() {
    document.getElementById("auth-box").style.display = "none";
    var viewer = document.getElementById("pdf-viewer");
    viewer.style.display = "block";
    document.getElementById("pdf-frame").src = PDF;
    document.body.style.background = "#525659";
  }
})();
</script>

</body>
</html>
